site_name: UELer
site_description: Usability Enhanced Linked Viewer for MIBI imaging
site_author: Yu-Le Wu (Hartmann Lab, DKFZ)
site_url: https://hartmannlab.github.io/UELer/
repo_url: https://github.com/HartmannLab/UELer
repo_name: HartmannLab/UELer
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Get Started: getting-started.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Basic Usage: tutorials/basic-usage.md
      - User Interface: tutorials/user-interface.md
      - Map Mode: tutorials/map-mode.md
      - Batch Export: tutorials/export.md
  - FAQ: faq.md
  - Developer Notes:
      - Overview: develop-notes/index.md
      - Packaging & Project: develop-notes/packaging.md
      - Viewer Runtime & UI: develop-notes/viewer-runtime.md
      - Map Mode Internals: develop-notes/map-mode.md
      - Export Pipeline: develop-notes/export-pipeline.md
      - ROI Workflows: develop-notes/roi-gallery.md
      - Heatmap & Cell Annotation: develop-notes/heatmap.md
      - OME-TIFF Loading: develop-notes/ome-tiff.md
